---
# tasks file for caddy_deploy

- name: Install prerequisites
  apt:
      pkg:
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
          - curl
  become: true

- name: Add key for Caddy repo
  apt_key:
      url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
      state: present
      keyring: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  become: true

- name: add Caddy repo
  apt_repository:
      repo:
          "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg]
          https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
      state: present
      filename: caddy-stable
  become: true

- name: add Caddy src repo
  apt_repository:
      repo:
          "deb-src [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg]
          https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
      state: present
      filename: caddy-stable
  become: true

- name: Install Caddy webserver
  apt:
      name: caddy
      update_cache: yes
      state: present
  become: true

- name: Create Caddy log directory
  file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: '0755'
  become: true

- name: Create config file
  template:
      src: Caddyfile.j2 # Откуда берем
      dest: /etc/caddy/Caddyfile # Куда кладем
  become: true

- name: Reload with new config
  service:
      name: caddy
      state: restarted
      enabled: true
  become: true

- name: Create web root directory
  ansible.builtin.file:
    path: /usr/share/caddy
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Create custom index page
  ansible.builtin.copy:
    dest: /usr/share/caddy/index.html
    owner: root
    group: root
    mode: '0644'
    content: |
      <!doctype html>
      <html lang="ru">
      <head>
          <meta charset="utf-8">
          <title>Hello world</title>
      </head>
      <body>
          <h1>Hello world</h1>
          <p>Эта страница развернута через Ansible и Caddy.</p>
      </body>
      </html>
  become: true
